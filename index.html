<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DESeq2 Heatmap Generator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>DESeq2 Heatmap Generator</h1>
      <p class="subtitle">Visualize filtered genes with clustered row-scaled heatmaps</p>
    </header>

    <div class="main-content">
      <div class="controls-panel">
        <div class="upload-section">
          <label for="deseqFile" class="file-label">
            <span class="file-icon">📁</span>
            <span class="file-text">Choose DESeq2 Output File</span>
            <input type="file" id="deseqFile" accept=".csv,.tsv,.txt">
          </label>
          <div id="deseqFileName" class="file-name"></div>
        </div>

        <div class="upload-section">
          <label for="geneFile" class="file-label">
            <span class="file-icon">🧬</span>
            <span class="file-text">Choose Optional Gene List File</span>
            <input type="file" id="geneFile" accept=".csv,.tsv,.txt">
          </label>
          <div id="geneFileName" class="file-name"></div>
        </div>

        <div class="thresholds-section">
          <div class="threshold-group">
            <label for="padjCutoff">padj.cutoff:</label>
            <input type="number" id="padjCutoff" min="0" max="1" step="0.001" value="0.05">
            <span class="range-label">(0 - 1)</span>
          </div>

          <div class="threshold-group">
            <label for="log2FCCutoff">log2FC.cutoff:</label>
            <input type="number" id="log2FCCutoff" min="0" step="0.01" value="1">
            <span class="range-label" id="log2FCRange">(0 - max |log2FoldChange|)</span>
          </div>

          <button id="updatePlot" class="btn btn-primary">Generate Heatmap</button>
        </div>

        <div class="export-section">
          <button id="exportPDF" class="btn btn-export" disabled>Export as PDF</button>
          <button id="exportSVG" class="btn btn-export" disabled style="margin-top:8px;">Export as SVG</button>
        </div>
      </div>

      <div class="plot-section">
        <div id="heatmapPlot" class="plot-container"></div>
        <div id="plotInfo" class="plot-info"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
